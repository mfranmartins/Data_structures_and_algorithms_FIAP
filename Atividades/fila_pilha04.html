<!DOCTYPE html>
<html lang="pt-br">
<head>
    <script>
        let dados = [10, 20, 30, 40, 50];
        let procurado = 30;
        let posicao = -1;

        for (let i = 0; i < dados.length; i++){
           if(dados[i] === procurado){
            posicao = i;
            break;
           }
        }
        if (posicao > -1)
        console.log('Encontrado na posição = ', posicao);
        else
        console.log("Valor não encontrado no vetor");
    </script>
</head>
<body>
</body>
</html>
